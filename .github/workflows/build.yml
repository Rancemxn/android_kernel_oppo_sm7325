name: Build Kernel

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Compile Kernel
    runs-on: ubuntu-24.04

    steps:
      - name: Configure Fast APT Mirror
        uses: vegardit/fast-apt-mirror.sh@v1
        
      - name: Make Build Environment
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget automake flex lzop bison gperf build-essential zip curl zlib1g-dev libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 ccache git-lfs gnupg imagemagick libelf-dev libncurses5-dev libsdl1.2-dev gpart fuse2fs e2fsck-static icu-doc rsync adb fastboot libstdc++6 python-is-python3 gcc-aarch64-linux-gnu
          mkdir -p kernel

      - name: Checkout Kernel Source
        uses: actions/checkout@v6
        with:
          repository: Rancemxn/android_kernel_oppo_sm7325
          path: kernel/msm-5.4
          fetch-depth: 1

      - name: Checkout Modules Source
        uses: actions/checkout@v6
        with:
          repository: oppo-source/android_kernel_modules_and_devicetree_oppo_sm7325
          path: temp_modules
          ref: oppo/sm7325_v_15.0.0_reno10

      - name: Prepare Compiler
        run: |
          mkdir -p compiler
          cd compiler
          
          curl -fL "https://github.com/Rancemxn/android_kernel_oppo_sm7325/releases/download/BuildTool/linux-x86-refs_heads_llvm-r383902b-clang-r383902.tar.gz" -o clang-r383902.tar.gz --connect-timeout 30 --retry 5 --retry-delay 5
          mkdir -p clang-bin
          tar -xzf clang-r383902.tar.gz -C clang-bin
          rm clang-r383902.tar.gz

      - name: Handle Dependencies
        run: |
          mv temp_modules/vendor ./vendor
          mv temp_modules/device ./device
          rm -rf temp_modules

      - name: Compile Kernel
        run: |
          export PATH="$(pwd)/compiler/clang-bin/bin:$PATH"
          export CROSS_COMPILE="aarch64-linux-android-"
          export CROSS_COMPILE_ARM32="arm-linux-androideabi-"
          export CLANG_TRIPLE="aarch64-linux-gnu-"
          export CLANG_PATH="$(pwd)/compiler/clang-bin/bin"
          export ARCH="arm64"
          export SUBARCH="arm64"
          cd kernel/msm-5.4
          make O=out CC="clang" LLVM=1 sm7325_defconfig
          make O=out CC="clang" LLVM=1 -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: OPPO_K10x_Kernel_Image
          path: kernel/msm-5.4/out/arch/arm64/boot/Image